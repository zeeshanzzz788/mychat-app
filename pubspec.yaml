name: mychat
description: Self-hosted real-time chat app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  socket_io_client: ^2.0.3+1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
